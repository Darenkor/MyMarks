<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyMarks — Gestor de Marcadores Personal</title>
  <meta name="description"
    content="Gestor de marcadores personal visual con tableros, categorías y extensión de navegador." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>

<body>
  <!-- Auth Screen -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-card">
      <svg class="auth-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" />
      </svg>
      <h1 class="auth-title">MyMarks</h1>
      <p class="auth-subtitle">Tu gestor de marcadores personal</p>

      <form id="auth-form" class="auth-form">
        <div class="form-group">
          <label for="auth-email">Email</label>
          <input type="email" id="auth-email" placeholder="tu@email.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="auth-password">Contraseña</label>
          <input type="password" id="auth-password" placeholder="Tu contraseña" required
            autocomplete="current-password" />
        </div>
        <button type="submit" id="auth-submit" class="btn btn-primary btn-lg auth-btn">Iniciar Sesión</button>
        <p id="auth-error" class="auth-error"></p>
      </form>

      <!-- Registration disabled - single user mode -->
    </div>
  </div>

  <div id="app" style="display:none">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" />
          </svg>
          <span class="logo-text">MyMarks</span>
        </div>
        <button id="theme-toggle" class="icon-btn" title="Cambiar tema" aria-label="Cambiar tema">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        </button>
      </div>

      <!-- Search -->
      <div class="sidebar-search">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input type="text" id="search-input" placeholder="Buscar marcadores..." autocomplete="off" />
      </div>

      <!-- Boards list -->
      <nav id="boards-nav" class="boards-nav">
        <div class="boards-nav-header">
          <span>TUS TABLEROS</span>
          <button id="add-board-btn" class="icon-btn small" title="Nuevo tablero" aria-label="Nuevo tablero">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
          </button>
        </div>
        <ul id="boards-list" class="boards-list"></ul>
      </nav>

      <!-- Bottom actions -->
      <div class="sidebar-footer">
        <button id="import-btn" class="sidebar-action" title="Importar marcadores">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          <span>Importar</span>
        </button>
        <button id="export-btn" class="sidebar-action" title="Exportar marcadores">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="17 8 12 3 7 8" />
            <line x1="12" y1="3" x2="12" y2="15" />
          </svg>
          <span>Exportar</span>
        </button>
      </div>
    </aside>

    <!-- Main content -->
    <main id="main-content" class="main-content">
      <!-- Top bar -->
      <header id="top-bar" class="top-bar">
        <button id="sidebar-toggle" class="icon-btn mobile-only" aria-label="Menú">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>
        <h1 id="board-title" class="board-title">Selecciona un tablero</h1>
        <div class="top-bar-actions">
          <button id="add-category-btn" class="btn btn-primary" style="display:none">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            Crear Categoría
          </button>
          <button id="add-bookmark-bar-btn" class="btn btn-primary" style="display:none">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            Barra Rápida
          </button>
        </div>
      </header>

      <!-- Board content area -->
      <div id="board-content" class="board-content">
        <!-- Welcome screen when no board selected -->
        <div id="welcome-screen" class="welcome-screen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="welcome-icon">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" />
          </svg>
          <h2>Bienvenido a MyMarks</h2>
          <p>Tu gestor de marcadores personal. Crea un tablero para empezar o importa tus marcadores desde el navegador.
          </p>
          <div class="welcome-actions">
            <button id="welcome-add-board" class="btn btn-primary btn-lg">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
              </svg>
              Crear Tablero
            </button>
            <button id="welcome-import" class="btn btn-secondary btn-lg">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="7 10 12 15 17 10" />
                <line x1="12" y1="15" x2="12" y2="3" />
              </svg>
              Importar Marcadores
            </button>
          </div>
        </div>

        <!-- Search results -->
        <div id="search-results" class="search-results" style="display:none">
          <h2 id="search-results-title"></h2>
          <div id="search-results-list" class="search-results-list"></div>
        </div>

        <!-- Categories grid -->
        <div id="categories-grid" class="categories-grid" style="display:none"></div>
      </div>
    </main>
  </div>

  <!-- Hidden file input for import -->
  <input type="file" id="import-file-input" accept=".html,.htm" style="display:none" />

  <!-- Modal overlay -->
  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div id="modal" class="modal">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button id="modal-close" class="icon-btn" aria-label="Cerrar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <div id="modal-body" class="modal-body"></div>
      <div id="modal-footer" class="modal-footer"></div>
    </div>
  </div>

  <!-- Context menu -->
  <div id="context-menu" class="context-menu" style="display:none"></div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
